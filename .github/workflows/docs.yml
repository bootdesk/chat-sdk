name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: tryvin/setup-php@f89a301251ea3f109745bab3a62be58575f216bf #v2.36.0-main
        with:
          php-version: 8.4
      - name: Install PHP dependencies
        run: composer install --no-interaction
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version: 22
      - name: Install JS dependencies
        run: npm ci
      - name: Generate PHP API docs
        run: composer docs
      - name: Build JS packages
        run: npm run build -w packages/js-web-adapter-core -w packages/js-web-adapter-react -w packages/chat-widget-bridge
      - name: Generate JS API docs
        run: npm run docs:js
      - name: Generate HTML guides
        run: npm run docs:guides
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
