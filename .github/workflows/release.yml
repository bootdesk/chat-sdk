name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -P '^\d+\.\d+\.\d+$'; then
            echo "Version must be semver (e.g., 0.2.0)"
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin --force "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true

  split:
    needs: release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: core, split_repository: chat-sdk-core }
          # - { local_path: laravel, split_repository: chat-sdk-laravel }
          # - {
          #     local_path: adapter-slack,
          #     split_repository: chat-sdk-adapter-slack,
          #   }
          # - {
          #     local_path: adapter-telegram,
          #     split_repository: chat-sdk-adapter-telegram,
          #   }
          # - {
          #     local_path: adapter-whatsapp,
          #     split_repository: chat-sdk-adapter-whatsapp,
          #   }
          # - {
          #     local_path: adapter-discord,
          #     split_repository: chat-sdk-adapter-discord,
          #   }
          # - {
          #     local_path: adapter-messenger,
          #     split_repository: chat-sdk-adapter-messenger,
          #   }
          # - { local_path: adapter-web, split_repository: chat-sdk-adapter-web }
          # - {
          #     local_path: adapter-github,
          #     split_repository: chat-sdk-adapter-github,
          #   }
          # - {
          #     local_path: adapter-linear,
          #     split_repository: chat-sdk-adapter-linear,
          #   }
          # - {
          #     local_path: adapter-telnyx,
          #     split_repository: chat-sdk-adapter-telnyx,
          #   }
          # - {
          #     local_path: botman-compat,
          #     split_repository: chat-sdk-botman-compat,
          #   }

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Split and push package
        env:
          TOKEN: ${{ secrets.PAT }}
        run: |
          REPO="bootdesk/${{ matrix.package.split_repository }}"
          TAG="v${{ inputs.version }}"
          PREFIX="packages/${{ matrix.package.local_path }}"
          SPLIT_BRANCH="split-${{ matrix.package.split_repository }}-$TAG"

          git config --global user.name "bootdesk-bot[bot]"
          git config --global user.email "178296575+bootdesk-bot[bot]@users.noreply.github.com"

          git branch -D "$SPLIT_BRANCH" 2>/dev/null || true
          git subtree split --prefix="$PREFIX" -b "$SPLIT_BRANCH"

          git checkout "$SPLIT_BRANCH"
          git tag -f "$TAG"

          git remote add target "https://x-access-token:${TOKEN}@github.com/${REPO}.git"

          git push target "$SPLIT_BRANCH:main" --force
          git push target "$TAG" --force
