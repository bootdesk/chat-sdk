name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -P '^\d+\.\d+\.\d+$'; then
            echo "Version must be semver (e.g., 0.2.0)"
            exit 1
          fi

      - name: Update PHP package versions
        run: |
          VERSION="${{ inputs.version }}"
          CARET="^$VERSION"
          for file in packages/*/composer.json; do
            jq --arg ver "$VERSION" --arg req "$CARET" '
              .version = $ver |
              .require |= with_entries(
                if .key | startswith("bootdesk/") then
                  .value = $req
                else . end
              )
            ' "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          done

      - name: Update NPM package versions
        run: |
          VERSION="${{ inputs.version }}"
          for file in packages/js-web-adapter-*/package.json; do
            jq --arg ver "$VERSION" '.version = $ver' "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          done

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add packages/*/composer.json packages/js-web-adapter-*/package.json
          git commit -m "chore: bump package versions to v${{ inputs.version }}"
          git push origin main

      - name: Create tag
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin --force "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true

  split:
    needs: release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: core, split_repository: chat-sdk-core }
          - { local_path: laravel, split_repository: chat-sdk-laravel }
          - {
              local_path: adapter-slack,
              split_repository: chat-sdk-adapter-slack,
            }
          - {
              local_path: adapter-telegram,
              split_repository: chat-sdk-adapter-telegram,
            }
          - {
              local_path: adapter-whatsapp,
              split_repository: chat-sdk-adapter-whatsapp,
            }
          - {
              local_path: adapter-discord,
              split_repository: chat-sdk-adapter-discord,
            }
          - {
              local_path: adapter-messenger,
              split_repository: chat-sdk-adapter-messenger,
            }
          - {
              local_path: adapter-instagram,
              split_repository: chat-sdk-adapter-instagram,
            }
          - { local_path: adapter-web, split_repository: chat-sdk-adapter-web }
          - {
              local_path: adapter-github,
              split_repository: chat-sdk-adapter-github,
            }
          - {
              local_path: adapter-linear,
              split_repository: chat-sdk-adapter-linear,
            }
          - {
              local_path: adapter-telnyx,
              split_repository: chat-sdk-adapter-telnyx,
            }
          - {
              local_path: botman-compat,
              split_repository: chat-sdk-botman-compat,
            }

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          fetch-tags: true

      - uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          PAT: "${{ secrets.PAT }}"
        with:
          tag: v${{ inputs.version }}
          package_directory: packages/${{ matrix.package.local_path }}
          repository_organization: bootdesk
          repository_name: ${{ matrix.package.split_repository }}
          user_name: github-actions
          user_email: github-actions@github.com

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        package:
          - { path: js-web-adapter-core }
          # - { path: js-web-adapter-react }

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@bootdesk"

      - name: Install dependencies
        run: npm ci
        working-directory: packages/${{ matrix.package.path }}

      - name: Build package
        run: npm run build
        working-directory: packages/${{ matrix.package.path }}

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/${{ matrix.package.path }}
