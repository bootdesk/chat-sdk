name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.2.0)"
        required: true
      action:
        description: "Action"
        required: true
        default: release
        type: choice
        options:
          - release
          - remove

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -P '^\d+\.\d+\.\d+$'; then
            echo "Version must be semver (e.g., 0.2.0)"
            exit 1
          fi

      - name: Delete tag and release
        if: inputs.action == 'remove'
        run: |
          gh release delete "v${{ inputs.version }}" --yes 2>/dev/null || echo "No release found"
          git push origin --delete "v${{ inputs.version }}" 2>/dev/null || echo "No tag found"

      - name: Update PHP package versions
        if: inputs.action == 'release'
        run: |
          VERSION="${{ inputs.version }}"
          CARET="$VERSION"
          for file in packages/*/composer.json; do
            jq --arg ver "$VERSION" --arg req "$CARET" '
              .version = $ver |
              .require |= with_entries(
                if .key | startswith("bootdesk/") then
                  .value = $req
                else . end
              )
            ' "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          done

      - name: Update NPM package versions
        if: inputs.action == 'release'
        run: |
          VERSION="${{ inputs.version }}"
          for file in packages/js-web-adapter-*/package.json packages/chat-widget-*/package.json; do
            jq --arg ver "$VERSION" --arg req "$VERSION" '
              .version = $ver |
              .peerDependencies |= with_entries(
                if .key | startswith("@bootdesk/") then
                  .value = $req
                else . end
              )
            ' "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          done

      - name: Commit version bump
        if: inputs.action == 'release'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add packages/*/composer.json packages/js-web-adapter-*/package.json packages/chat-widget-*/package.json
          git commit -m "chore: bump package versions to v${{ inputs.version }}"
          git push origin main

      - name: Create tag
        if: inputs.action == 'release'
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin --force "v${{ inputs.version }}"

      - name: Create GitHub release
        if: inputs.action == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true

  split:
    if: inputs.action == 'release'
    needs: release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: core, split_repository: chat-sdk-core }
          - { local_path: laravel, split_repository: chat-sdk-laravel }
          - {
              local_path: adapter-slack,
              split_repository: chat-sdk-adapter-slack,
            }
          - {
              local_path: adapter-telegram,
              split_repository: chat-sdk-adapter-telegram,
            }
          - {
              local_path: adapter-whatsapp,
              split_repository: chat-sdk-adapter-whatsapp,
            }
          - {
              local_path: adapter-discord,
              split_repository: chat-sdk-adapter-discord,
            }
          - {
              local_path: adapter-messenger,
              split_repository: chat-sdk-adapter-messenger,
            }
          - {
              local_path: adapter-instagram,
              split_repository: chat-sdk-adapter-instagram,
            }
          - { local_path: adapter-web, split_repository: chat-sdk-adapter-web }
          - {
              local_path: adapter-github,
              split_repository: chat-sdk-adapter-github,
            }
          - {
              local_path: adapter-linear,
              split_repository: chat-sdk-adapter-linear,
            }
          - {
              local_path: adapter-telnyx,
              split_repository: chat-sdk-adapter-telnyx,
            }
          - {
              local_path: adapter-twilio,
              split_repository: chat-sdk-adapter-twilio,
            }
          - {
              local_path: botman-compat,
              split_repository: chat-sdk-botman-compat,
            }

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          fetch-tags: true

      - uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          PAT: "${{ secrets.PAT }}"
        with:
          tag: v${{ inputs.version }}
          package_directory: packages/${{ matrix.package.local_path }}
          repository_organization: bootdesk
          repository_name: ${{ matrix.package.split_repository }}
          user_name: github-actions
          user_email: github-actions@github.com

  remove-split:
    if: inputs.action == 'remove'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: core, split_repository: chat-sdk-core }
          - { local_path: laravel, split_repository: chat-sdk-laravel }
          - {
              local_path: adapter-slack,
              split_repository: chat-sdk-adapter-slack,
            }
          - {
              local_path: adapter-telegram,
              split_repository: chat-sdk-adapter-telegram,
            }
          - {
              local_path: adapter-whatsapp,
              split_repository: chat-sdk-adapter-whatsapp,
            }
          - {
              local_path: adapter-discord,
              split_repository: chat-sdk-adapter-discord,
            }
          - {
              local_path: adapter-messenger,
              split_repository: chat-sdk-adapter-messenger,
            }
          - {
              local_path: adapter-instagram,
              split_repository: chat-sdk-adapter-instagram,
            }
          - { local_path: adapter-web, split_repository: chat-sdk-adapter-web }
          - {
              local_path: adapter-github,
              split_repository: chat-sdk-adapter-github,
            }
          - {
              local_path: adapter-linear,
              split_repository: chat-sdk-adapter-linear,
            }
          - {
              local_path: adapter-telnyx,
              split_repository: chat-sdk-adapter-telnyx,
            }
          - {
              local_path: adapter-twilio,
              split_repository: chat-sdk-adapter-twilio,
            }
          - {
              local_path: botman-compat,
              split_repository: chat-sdk-botman-compat,
            }

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          repository: bootdesk/${{ matrix.package.split_repository }}
          token: ${{ secrets.PAT }}

      - name: Delete tag and release from split repo
        run: |
          gh release delete "v${{ inputs.version }}" --yes 2>/dev/null || echo "No release in ${{ matrix.package.split_repository }}"
          git push origin --delete "v${{ inputs.version }}" 2>/dev/null || echo "No tag in ${{ matrix.package.split_repository }}"

  npm-publish:
    if: inputs.action == 'release'
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-tags: true

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@bootdesk"

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV

      - name: Upgrade npm for OIDC
        run: npm install -g npm@11.15.0

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install & build all
        run: |
          npm ci
          npm run build -w packages/js-web-adapter-core -w packages/chat-widget-bridge -w packages/js-web-adapter-react

      - name: Publish core
        run: npm publish --access public --provenance
        working-directory: packages/js-web-adapter-core

      - name: Publish react
        run: npm publish --access public --provenance
        working-directory: packages/js-web-adapter-react

      - name: Publish bridge
        run: npm publish --access public --provenance
        working-directory: packages/chat-widget-bridge
